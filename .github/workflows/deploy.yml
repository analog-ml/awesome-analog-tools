name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tools.json
        run: |
          python3 -c "
          import json, sys

          REQUIRED = {'id','name','description','url','category','tags','license','stars','owner'}
          VALID_CATS = {
            'simulator','layout','pdk','schematic','rf-microwave',
            'mixed-signal','waveform','characterization','framework','research'
          }

          with open('data/tools.json') as f:
              tools = json.load(f)

          ids = set()
          for i, t in enumerate(tools):
              missing = REQUIRED - t.keys()
              if missing:
                  print(f'Tool #{i} ({t.get(\"id\",\"?\")}) missing fields: {missing}')
                  sys.exit(1)
              if t['id'] in ids:
                  print(f'Duplicate id: {t[\"id\"]}')
                  sys.exit(1)
              ids.add(t['id'])
              if t['category'] not in VALID_CATS:
                  print(f'Invalid category \"{t[\"category\"]}\" in tool \"{t[\"id\"]}\"')
                  sys.exit(1)

          print(f'tools.json OK — {len(tools)} tools validated.')
          "

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
