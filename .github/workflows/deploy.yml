name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Validate JSON data files (skipped on PR close — nothing to validate) ──
  validate:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate data files
        run: |
          python3 -c "
          import json, sys

          def load(path):
              with open(path) as f:
                  return json.load(f)

          errors = []

          # tools.json
          TOOL_REQ = {'id','name','description','url','category','tags','license','stars','owner'}
          VALID_CATS = {'simulator','layout','pdk','schematic','rf-microwave',
                        'mixed-signal','waveform','characterization','framework','research'}
          tools = load('data/tools.json')
          ids = set()
          for i, t in enumerate(tools):
              miss = TOOL_REQ - t.keys()
              if miss: errors.append(f'tools[{i}] missing {miss}')
              if t.get('id') in ids: errors.append(f'tools duplicate id: {t[\"id\"]}')
              ids.add(t.get('id'))
              if t.get('category') not in VALID_CATS: errors.append(f'tools[{i}] bad category: {t.get(\"category\")}')

          # papers.json
          PAPER_REQ = {'id','title','abstract','venue','year','pdf','tasks','methods','repos'}
          papers = load('data/papers.json')
          pids = set()
          for i, p in enumerate(papers):
              miss = PAPER_REQ - p.keys()
              if miss: errors.append(f'papers[{i}] missing {miss}')
              if p.get('id') in pids: errors.append(f'papers duplicate id: {p[\"id\"]}')
              pids.add(p.get('id'))

          # datasets.json
          DS_REQ = {'id','name','description','url','tasks','license','papers','tags'}
          datasets = load('data/datasets.json')
          dids = set()
          for i, d in enumerate(datasets):
              miss = DS_REQ - d.keys()
              if miss: errors.append(f'datasets[{i}] missing {miss}')
              if d.get('id') in dids: errors.append(f'datasets duplicate id: {d[\"id\"]}')
              dids.add(d.get('id'))
              for pid in d.get('papers', []):
                  if pid not in pids: errors.append(f'datasets[{i}] references unknown paper id: {pid}')

          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print(f'OK — {len(tools)} tools, {len(papers)} papers, {len(datasets)} datasets')
          "

  # ── Deploy main branch to root of gh-pages ───────────────────────────────
  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
          clean-exclude: pr-preview  # don't wipe active PR previews

  # ── Deploy / remove PR preview on the gh-pages branch ────────────────────
  preview:
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    concurrency:
      group: preview-${{ github.ref }}
      cancel-in-progress: false  # always let cleanup finish on PR close
    steps:
      - uses: actions/checkout@v4

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: .
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
