name: Issue → Pull Request

# Trigger on 'labeled' not 'opened': issue form labels are applied
# asynchronously after the opened event, so the label array is empty
# when 'opened' fires — causing the job to be skipped.
on:
  issues:
    types: [labeled]

jobs:
  create-pr:
    # github.event.label.name is the label just added (reliable on 'labeled' event)
    if: >-
      github.event.label.name == 'new-tool' ||
      github.event.label.name == 'new-paper' ||
      github.event.label.name == 'new-dataset'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      # ── Debug: log event context to help diagnose future failures ─────────
      - name: Debug event context
        run: |
          echo "=== Event context ==="
          echo "Event name   : ${{ github.event_name }}"
          echo "Issue number : ${{ github.event.issue.number }}"
          echo "Label added  : ${{ github.event.label.name }}"
          echo "Issue labels : ${{ toJson(github.event.issue.labels.*.name) }}"
          echo "Issue title  : ${{ github.event.issue.title }}"
          echo "Issue user   : ${{ github.event.issue.user.login }}"
          echo "=== Issue body (first 500 chars) ==="
          echo '${{ github.event.issue.body }}' | head -c 500

      # ── Parse issue body and append entry to the JSON data file ──────────
      - name: Parse issue and update JSON
        id: parse
        env:
          ISSUE_BODY:        ${{ github.event.issue.body }}
          ISSUE_LABEL_ADDED: ${{ github.event.label.name }}
          ISSUE_NUMBER:      ${{ github.event.issue.number }}
        run: python3 .github/scripts/issue_to_json.py

      # ── Log parse outputs for debugging ──────────────────────────────────
      - name: Debug parse outputs
        run: |
          echo "=== Parse outputs ==="
          echo "success   : ${{ steps.parse.outputs.success }}"
          echo "kind      : ${{ steps.parse.outputs.kind }}"
          echo "entry_id  : ${{ steps.parse.outputs.entry_id }}"
          echo "data_file : ${{ steps.parse.outputs.data_file }}"
          echo "branch    : ${{ steps.parse.outputs.branch }}"
          echo "pr_title  : ${{ steps.parse.outputs.pr_title }}"
          echo "error     : ${{ steps.parse.outputs.error }}"

      # ── Create branch → commit → push → open PR → comment (success) ──────
      - name: Create PR
        if: steps.parse.outputs.success == 'true'
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          BRANCH:      ${{ steps.parse.outputs.branch }}
          PR_TITLE:    ${{ steps.parse.outputs.pr_title }}
          DATA_FILE:   ${{ steps.parse.outputs.data_file }}
          ENTRY_KIND:  ${{ steps.parse.outputs.kind }}
          ENTRY_ID:    ${{ steps.parse.outputs.entry_id }}
          ENTRY_LABEL: ${{ steps.parse.outputs.label }}
          ISSUE_NUM:   ${{ github.event.issue.number }}
          ISSUE_USER:  ${{ github.event.issue.user.login }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add "$DATA_FILE"
          git commit -m "Add ${ENTRY_KIND}: ${ENTRY_ID} (closes #${ISSUE_NUM})"
          git push origin "$BRANCH"

          # Write PR body to a temp file to safely handle special characters
          cat > /tmp/pr-body.md << PRBODY
          Closes #${ISSUE_NUM}

          Automatically generated from issue #${ISSUE_NUM} by @${ISSUE_USER}.

          **Please review \`${DATA_FILE}\` before merging** — especially:
          - Field values look correct and complete
          - \`id\` is unique and kebab-cased
          - For datasets: fill in the \`papers\` array with IDs from \`data/papers.json\` if applicable
          PRBODY

          PR_URL=$(gh pr create \
            --title  "$PR_TITLE" \
            --body-file /tmp/pr-body.md \
            --label  "$ENTRY_LABEL" \
            --head   "$BRANCH")

          echo "PR created: $PR_URL"

          gh issue comment "$ISSUE_NUM" --body \
            "Thanks @${ISSUE_USER}! A pull request has been automatically opened: ${PR_URL}

          A maintainer will review and merge it shortly. If anything looks off you can edit the JSON directly in the PR."

      # ── Comment with the parse error so the submitter can fix it (failure) ─
      - name: Comment on parse failure
        if: steps.parse.outputs.success == 'false'
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ERROR_MSG: ${{ steps.parse.outputs.error }}
        run: |
          gh issue comment "$ISSUE_NUM" --body \
            "⚠️ Could not automatically create a pull request.

          **Reason:** ${ERROR_MSG}

          Please check that all required fields are filled in and resubmit, or open a PR manually following [CONTRIBUTING.md](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md)."
