name: Issue → Pull Request

# Use 'opened' (not 'labeled'): labels from issue form templates are applied
# asynchronously and were never being set because the labels didn't exist in
# the repo. Instead we detect the form type from unique body field headers,
# and apply the label ourselves inside the workflow.
on:
  issues:
    types: [opened]

jobs:
  create-pr:
    # Guard: only run for issues whose title starts with our form prefixes.
    # The Python script does the authoritative body-based detection.
    if: >-
      startsWith(github.event.issue.title, 'Add tool:') ||
      startsWith(github.event.issue.title, 'Add paper:') ||
      startsWith(github.event.issue.title, 'Add dataset:')

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      # ── Debug: log event context ──────────────────────────────────────────
      - name: Debug event context
        run: |
          echo "=== Event context ==="
          echo "Event      : ${{ github.event_name }}"
          echo "Issue #    : ${{ github.event.issue.number }}"
          echo "Issue title: ${{ github.event.issue.title }}"
          echo "Submitter  : ${{ github.event.issue.user.login }}"
          echo "=== Issue body (first 800 chars) ==="
          cat << 'BODYEOF'
          ${{ github.event.issue.body }}
          BODYEOF

      # ── Parse issue body and append entry to the JSON data file ──────────
      - name: Parse issue and update JSON
        id: parse
        env:
          ISSUE_BODY:   ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python3 .github/scripts/issue_to_json.py

      # ── Log parse outputs ─────────────────────────────────────────────────
      - name: Debug parse outputs
        run: |
          echo "success   : ${{ steps.parse.outputs.success }}"
          echo "kind      : ${{ steps.parse.outputs.kind }}"
          echo "entry_id  : ${{ steps.parse.outputs.entry_id }}"
          echo "data_file : ${{ steps.parse.outputs.data_file }}"
          echo "branch    : ${{ steps.parse.outputs.branch }}"
          echo "pr_title  : ${{ steps.parse.outputs.pr_title }}"
          echo "error     : ${{ steps.parse.outputs.error }}"

      # ── Apply label to the issue so it's tagged for tracking ─────────────
      - name: Label issue
        if: steps.parse.outputs.success == 'true'
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          LABEL:     ${{ steps.parse.outputs.label }}
        run: gh issue edit "$ISSUE_NUM" --add-label "$LABEL"

      # ── Push branch and open PR ───────────────────────────────────────────
      # gh pr create requires a PAT because the org disables Actions from
      # creating PRs (org-level setting that cannot be overridden per-repo).
      # Add a fine-grained PAT with "Pull requests: write" + "Contents: write"
      # as a repo secret named GH_PAT.
      - name: Push branch
        if: steps.parse.outputs.success == 'true'
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          BRANCH:      ${{ steps.parse.outputs.branch }}
          DATA_FILE:   ${{ steps.parse.outputs.data_file }}
          ENTRY_KIND:  ${{ steps.parse.outputs.kind }}
          ENTRY_ID:    ${{ steps.parse.outputs.entry_id }}
          ISSUE_NUM:   ${{ github.event.issue.number }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$DATA_FILE"
          git commit -m "Add ${ENTRY_KIND}: ${ENTRY_ID} (closes #${ISSUE_NUM})"
          git push origin "$BRANCH"

      - name: Create PR
        if: steps.parse.outputs.success == 'true'
        env:
          # Use PAT — GITHUB_TOKEN is blocked from creating PRs by org policy
          GH_TOKEN:    ${{ secrets.GH_PAT }}
          BRANCH:      ${{ steps.parse.outputs.branch }}
          PR_TITLE:    ${{ steps.parse.outputs.pr_title }}
          DATA_FILE:   ${{ steps.parse.outputs.data_file }}
          ENTRY_LABEL: ${{ steps.parse.outputs.label }}
          ISSUE_NUM:   ${{ github.event.issue.number }}
          ISSUE_USER:  ${{ github.event.issue.user.login }}
        run: |
          cat > /tmp/pr-body.md << PRBODY
          Closes #${ISSUE_NUM}

          Automatically generated from issue #${ISSUE_NUM} by @${ISSUE_USER}.

          **Please review \`${DATA_FILE}\` before merging** — especially:
          - Field values look correct and complete
          - \`id\` is unique and kebab-cased
          - For datasets: fill in the \`papers\` array with IDs from \`data/papers.json\` if applicable
          PRBODY

          PR_URL=$(gh pr create \
            --title  "$PR_TITLE" \
            --body-file /tmp/pr-body.md \
            --label  "$ENTRY_LABEL" \
            --head   "$BRANCH")

          echo "PR created: $PR_URL"

          # Comment on the issue using GITHUB_TOKEN (always available)
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh issue comment "$ISSUE_NUM" --body \
            "Thanks @${ISSUE_USER}! A pull request has been automatically opened: ${PR_URL}

          A maintainer will review and merge it shortly. If anything looks off you can edit the JSON directly in the PR."

      # ── Comment on parse failure ──────────────────────────────────────────
      - name: Comment on parse failure
        if: steps.parse.outputs.success == 'false'
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ERROR_MSG: ${{ steps.parse.outputs.error }}
        run: |
          gh issue comment "$ISSUE_NUM" --body \
            "⚠️ Could not automatically create a pull request.

          **Reason:** ${ERROR_MSG}

          Please check that all required fields are filled in, or open a PR manually by following [CONTRIBUTING.md](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md)."
